<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPano AI - 360 Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; }
        #panorama { width: 100vw; height: 100vh; }
        .title-overlay { position: absolute; top: 10px; left: 20px; z-index: 10; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div class="title-overlay">
        <h2>Trình xem Panorama Tương Tác</h2>
        <p>Dùng chuột kéo để xoay, lăn chuột để thu phóng.</p>
    </div>
    
    <div id="panorama"></div>
    
    <script>
    pannellum.viewer('panorama', {
        "type": "equirectangular",
        // Trỏ đường dẫn ngược về file output vừa được Python tạo ra
        "panorama": "../data/output/panorama_result.jpg", 
        "autoLoad": true,
        "compass": true
    });
    </script>
</body>
</html>
